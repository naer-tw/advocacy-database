<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國教行動聯盟 倡議追蹤系統</title>
<style>
:root{--primary:#1F4E79;--bg:#f8f9fa;--card:#fff;--text:#2c3e50;--muted:#7f8c8d;--border:#e9ecef}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
.header{background:linear-gradient(135deg,var(--primary),#2c3e50);color:#fff;padding:24px 32px}
.header h1{font-size:22px;font-weight:600}
.header p{font-size:13px;opacity:.8;margin-top:4px}
.container{max-width:1200px;margin:0 auto;padding:20px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:10px;padding:18px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);border-top:3px solid var(--primary)}
.kpi .num{font-size:32px;font-weight:700;color:var(--primary)}
.kpi .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:var(--card);border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h3{font-size:13px;color:var(--muted);margin-bottom:14px;font-weight:500}
.bar-row{display:flex;align-items:center;margin-bottom:6px}
.bar-lbl{width:90px;font-size:12px;text-align:right;padding-right:10px;flex-shrink:0}
.bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:20px;position:relative;display:flex}
.bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:600;transition:width .5s}
.bar-seg:first-child{border-radius:4px 0 0 4px}
.bar-seg:last-child{border-radius:0 4px 4px 0}
.year-row{display:flex;gap:16px;margin-bottom:20px}
.year-card{flex:1;background:var(--card);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center}
.year-card .yr{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:8px}
.month-row{display:flex;align-items:flex-end;justify-content:space-between;height:100px}
.month-col{display:flex;flex-direction:column;align-items:center;flex:1}
.month-bar{width:20px;border-radius:3px 3px 0 0;transition:height .5s}
.month-lbl{font-size:10px;color:var(--muted);margin-top:4px}
.month-cnt{font-size:10px;font-weight:600;margin-bottom:2px}
.filters{background:var(--card);border-radius:10px;padding:14px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filters label{font-size:12px;color:var(--muted)}
.filters select,.filters input{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:#fff}
.filters input[type=text]{width:200px}
.tbl-card{background:var(--card);border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow-x:auto}
.tbl-card h3{font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--primary);color:#fff;padding:8px 10px;text-align:left;font-weight:500;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--border)}
tr:hover{background:#f5f8ff}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.yes{color:#27ae60;font-weight:600}
.badge{font-size:11px;color:var(--muted);margin-left:6px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.legend span{font-size:11px;display:flex;align-items:center;gap:4px}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--muted);margin-top:10px}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}.year-row{flex-direction:column}.filters{flex-direction:column}}
</style>
</head>

    '<div class="kpi"><div class="num">'+ev+'</div><div class="lbl">記者會/公聽會/論壇</div></div>';
}

function yearCards(){
  var yrs=["2024","2025"];
  var html="";
  yrs.forEach(function(y){
    var items=D.filter(function(d){return d["年度"]===y;});
    var topics={};items.forEach(function(d){topics[d["議題分類"]]=(topics[d["議題分類"]]||0)+1;});
    var sorted=Object.keys(topics).sort(function(a,b){return topics[b]-topics[a];}).slice(0,3);
    var gr=items.filter(function(d){return d["政府回應"]==="有";}).length;
    var topStr=sorted.map(function(t){return t+"("+topics[t]+")";}).join("、");
    html+='<div class="year-card"><div class="yr">'+y+' 年</div><div class="num" style="font-size:28px;font-weight:700;color:'+YC[y]+'">'+items.length+'</div><div class="lbl" style="font-size:11px;color:#999">篇新聞稿 ｜ '+gr+' 篇有回應</div><div style="margin-top:8px;font-size:11px;color:#666">'+topStr+'</div></div>';
  });
  document.getElementById("yearCards").innerHTML=html;
}

function topicChart(){
  var topics={};D.forEach(function(d){topics[d["議題分類"]]=(topics[d["議題分類"]]||0)+1;});
  var keys=Object.keys(topics).sort(function(a,b){return topics[b]-topics[a];});
  var mx=topics[keys[0]];
  var yrs=["2024","2025"];
  var html="";
  keys.forEach(function(t){
    var counts=yrs.map(function(y){return D.filter(function(d){return d["議題分類"]===t&&d["年度"]===y;}).length;});
    var total=counts[0]+counts[1];
    var segs="";
    counts.forEach(function(c,i){
      if(c>0) segs+='<div class="bar-seg" style="width:'+((c/mx)*100)+'%;background:'+YC[yrs[i]]+'">'+(c>1?c:"")+'</div>';
    });
    html+='<div class="bar-row"><div class="bar-lbl">'+t+'</div><div class="bar-track">'+segs+'<span style="position:absolute;right:4px;font-size:10px;color:#666;top:3px">'+total+'</span></div></div>';
  });
  document.getElementById("topicChart").innerHTML=html;
  document.getElementById("legend").innerHTML=yrs.map(function(y){return '<span><i style="background:'+YC[y]+'"></i>'+y+'</span>';}).join("");
}

function monthChart(){
  var ms=["01","02","03","04","05","06","07","08","09","10","11","12"];
  var mn=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  var d25=D.filter(function(d){return d["年度"]==="2025";});
  var counts={};ms.forEach(function(m){counts[m]=0;});
  d25.forEach(function(d){var m=d["日期"].substring(5,7);if(counts[m]!==undefined)counts[m]++;});
  var vals=ms.map(function(m){return counts[m];});
  var mx=Math.max.apply(null,vals);
  if(mx===0)mx=1;
  var html="";
  ms.forEach(function(m,i){
    var h=Math.max(counts[m]/mx*80,3);
    var bg=counts[m]>0?YC["2025"]:"#e0e0e0";
    html+='<div class="month-col"><div class="month-cnt">'+counts[m]+'</div><div class="month-bar" style="height:'+h+'px;background:'+bg+'"></div><div class="month-lbl">'+mn[i]+'</div></div>';
  });
  document.getElementById("monthChart").innerHTML=html;
}

function filters(){
  var ySet={},tSet={},tySet={};
  D.forEach(function(d){ySet[d["年度"]]=1;tSet[d["議題分類"]]=1;tySet[d["行動類型"]]=1;});
  Object.keys(ySet).sort().forEach(function(y){var o=document.createElement("option");o.value=y;o.textContent=y+"年";document.getElementById("fYear").appendChild(o);});
  Object.keys(tSet).sort().forEach(function(t){var o=document.createElement("option");o.value=t;o.textContent=t;document.getElementById("fTopic").appendChild(o);});
  Object.keys(tySet).sort().forEach(function(t){var o=document.createElement("option");o.value=t;o.textContent=t;document.getElementById("fType").appendChild(o);});
}

function bindF(){
  ["fYear","fTopic","fType","fResp"].forEach(function(id){document.getElementById(id).addEventListener("change",applyF);});
  document.getElementById("fSearch").addEventListener("input",applyF);
}

function applyF(){
  var y=document.getElementById("fYear").value;
  var t=document.getElementById("fTopic").value;
  var tp=document.getElementById("fType").value;
  var r=document.getElementById("fResp").value;
  var s=document.getElementById("fSearch").value.toLowerCase();
  var f=D;
  if(y) f=f.filter(function(d){return d["年度"]===y;});
  if(t) f=f.filter(function(d){return d["議題分類"]===t||d["次要議題"]===t;});
  if(tp) f=f.filter(function(d){return d["行動類型"]===tp;});
  if(r==="有") f=f.filter(function(d){return d["政府回應"]==="有";});
  if(r==="無") f=f.filter(function(d){return d["政府回應"]!=="有";});
  if(s) f=f.filter(function(d){return d["標題"].toLowerCase().indexOf(s)>=0||d["訴求對象"].indexOf(s)>=0;});
  tbl(f);
}

function tbl(items){
  document.getElementById("badge").textContent="顯示 "+items.length+" / "+D.length+" 篇";
  var html="";
  items.forEach(function(d){
    var tc=TC[d["議題分類"]]||"#95a5a6";
    var resp=d["政府回應"]==="有"?'<span class="yes">有</span>':"—";
    html+="<tr><td>"+d["編號"]+"</td><td>"+d["年度"]+'</td><td style="white-space:nowrap">'+d["日期"]+"</td><td>"+d["標題"]+'</td><td><span class="tag" style="background:'+tc+'22;color:'+tc+'">'+d["議題分類"]+"</span></td><td>"+d["行動類型"]+"</td><td>"+d["訴求對象"]+"</td><td>"+resp+"</td></tr>";
  });
  document.getElementById("tbody").innerHTML=html;
}

init();
</script>
</body>
</html>
